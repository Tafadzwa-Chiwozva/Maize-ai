<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maize AI — Crop Disease Detection</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #2d6a2d;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      font-size: 0.95rem;
      color: #555;
    }

    /* ── Main card ────────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 540px;
    }

    /* ── Upload / drop zone ───────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed #b5d4b5;
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;          /* lets the hidden input overlay it */
    }

    /* Hidden file input that covers the whole drop zone so clicking anywhere opens the picker */
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone.drag-over {
      border-color: #2d6a2d;
      background: #f0f8f0;
    }

    .drop-zone .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
    }

    .drop-zone p {
      font-size: 0.95rem;
      color: #555;
      pointer-events: none;        /* text doesn't block drag events */
    }

    .drop-zone p span {
      color: #2d6a2d;
      font-weight: 600;
    }

    .drop-zone .hint {
      font-size: 0.8rem;
      color: #999;
      margin-top: 6px;
    }

    /* ── Preview image ────────────────────────────────────────────── */
    #preview-section {
      display: none;               /* hidden until an image is chosen */
      margin-top: 20px;
    }

    #preview-img {
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid #e5e5e5;
    }

    /* ── Analyse button ───────────────────────────────────────────── */
    #analyse-btn {
      display: none;               /* hidden until an image is chosen */
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      background: #2d6a2d;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #analyse-btn:hover  { background: #245424; }
    #analyse-btn:disabled { background: #8ab58a; cursor: not-allowed; }

    /* ── Loading spinner ──────────────────────────────────────────── */
    .spinner {
      display: none;
      margin: 24px auto 0;
      width: 36px;
      height: 36px;
      border: 4px solid #e5e5e5;
      border-top-color: #2d6a2d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result panel ─────────────────────────────────────────────── */
    #result-section {
      display: none;               /* hidden until a result arrives */
      margin-top: 28px;
      border-top: 1px solid #eee;
      padding-top: 24px;
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 4px;
    }

    /* Disease name badge */
    #disease-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #2d6a2d;
      margin-bottom: 16px;
    }

    /* Confidence bar */
    .confidence-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .confidence-label { font-size: 0.85rem; color: #555; min-width: 110px; }

    .bar-track {
      flex: 1;
      height: 10px;
      background: #e5e5e5;
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #2d6a2d;
      border-radius: 99px;
      transition: width 0.6s ease;
      width: 0;               /* starts at 0, animated via JS */
    }

    /* Muted colour for low-confidence bars */
    .bar-fill.low { background: #c0d9c0; }

    .pct { font-size: 0.8rem; color: #555; min-width: 38px; text-align: right; }

    /* Description box */
    #description-box {
      margin-top: 20px;
      background: #f5f7f2;
      border-left: 4px solid #2d6a2d;
      border-radius: 6px;
      padding: 14px 16px;
      font-size: 0.9rem;
      color: #333;
      line-height: 1.6;
    }

    /* ── Error box ────────────────────────────────────────────────── */
    #error-box {
      display: none;
      margin-top: 20px;
      background: #fff0f0;
      border-left: 4px solid #cc3333;
      border-radius: 6px;
      padding: 14px 16px;
      font-size: 0.9rem;
      color: #cc3333;
    }

    /* ── Reset link ───────────────────────────────────────────────── */
    #reset-btn {
      display: none;
      margin-top: 20px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85rem;
      color: #555;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    #reset-btn:hover { border-color: #2d6a2d; color: #2d6a2d; }
  </style>
</head>
<body>

  <header>
    <h1>Maize AI</h1>
    <p>Upload a photo of a maize leaf to detect crop disease</p>
  </header>

  <div class="card">

    <!-- ── Drop zone: click or drag an image here ── -->
    <div class="drop-zone" id="drop-zone">
      <!-- Invisible file input so clicking anywhere on the box opens the file picker -->
      <input type="file" id="file-input" accept="image/*" />
      <span class="icon">🌿</span>
      <p>Click or drag a photo here</p>
      <p class="hint">JPG, PNG, or WEBP &bull; Taken in good light works best</p>
    </div>

    <!-- ── Image preview shown after selection ── -->
    <div id="preview-section">
      <img id="preview-img" src="" alt="Selected leaf" />
    </div>

    <!-- ── Button to trigger the API call ── -->
    <button id="analyse-btn">Analyse Leaf</button>

    <!-- ── Spinner while waiting for the API response ── -->
    <div class="spinner" id="spinner"></div>

    <!-- ── Error message if something goes wrong ── -->
    <div id="error-box"></div>

    <!-- ── Prediction results ── -->
    <div id="result-section">
      <p class="result-label">Detected Disease</p>
      <div id="disease-name"></div>

      <p class="result-label">Confidence Scores</p>
      <!-- Confidence bars are generated by JS and inserted here -->
      <div id="scores-container"></div>

      <div id="description-box"></div>

      <button id="reset-btn">Test Another Leaf</button>
    </div>

  </div>

  <script>
    // ── Element references ──────────────────────────────────────────
    const dropZone     = document.getElementById('drop-zone');
    const fileInput    = document.getElementById('file-input');
    const previewSec   = document.getElementById('preview-section');
    const previewImg   = document.getElementById('preview-img');
    const analyseBtn   = document.getElementById('analyse-btn');
    const spinner      = document.getElementById('spinner');
    const resultSec    = document.getElementById('result-section');
    const diseaseName  = document.getElementById('disease-name');
    const scoresDiv    = document.getElementById('scores-container');
    const descBox      = document.getElementById('description-box');
    const errorBox     = document.getElementById('error-box');
    const resetBtn     = document.getElementById('reset-btn');

    // The FastAPI backend URL — change this if you deploy to a server
    const API_URL = 'http://localhost:8000/predict';

    // The file chosen by the user (stored so the Analyse button can send it)
    let selectedFile = null;

    // ── Drag-and-drop visual feedback ──────────────────────────────
    // Show a green highlight when the user drags a file over the drop zone
    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    // When the user drops a file onto the zone, treat it like a file-picker selection
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFileSelected(file);
    });

    // ── File picker selection ───────────────────────────────────────
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFileSelected(fileInput.files[0]);
    });

    // ── Process the chosen file ─────────────────────────────────────
    function handleFileSelected(file) {
      selectedFile = file;

      // Show a local preview immediately (no server needed yet)
      const objectURL = URL.createObjectURL(file);
      previewImg.src = objectURL;
      previewSec.style.display = 'block';

      // Show the Analyse button, hide previous results/errors
      analyseBtn.style.display = 'block';
      resultSec.style.display = 'none';
      errorBox.style.display = 'none';
      resetBtn.style.display = 'none';
    }

    // ── Send image to the API when Analyse is clicked ───────────────
    analyseBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      // Show spinner, disable the button while waiting
      spinner.style.display = 'block';
      analyseBtn.disabled = true;
      resultSec.style.display = 'none';
      errorBox.style.display = 'none';

      try {
        // Build a multipart form — FastAPI expects the file field named "file"
        const form = new FormData();
        form.append('file', selectedFile);

        // POST to the FastAPI /predict endpoint
        const response = await fetch(API_URL, { method: 'POST', body: form });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ detail: 'Unknown error' }));
          throw new Error(err.detail || `HTTP ${response.status}`);
        }

        const data = await response.json();
        showResult(data);

      } catch (err) {
        // Show a friendly error message if the request fails
        errorBox.textContent = `Could not get a result: ${err.message}. Is the server running?`;
        errorBox.style.display = 'block';
      } finally {
        // Always hide the spinner and re-enable the button
        spinner.style.display = 'none';
        analyseBtn.disabled = false;
      }
    });

    // ── Render the prediction result ────────────────────────────────
    function showResult(data) {
      // Disease name
      diseaseName.textContent = data.class.replace(/_/g, ' ');

      // Confidence bars — one per class, sorted high to low
      scoresDiv.innerHTML = '';
      const sorted = Object.entries(data.all_scores)
        .sort(([, a], [, b]) => b - a);   // sort descending by score

      sorted.forEach(([cls, pct]) => {
        const isTop = cls === data.class;

        // Build: [label] [==bar==] [pct%]
        const row = document.createElement('div');
        row.className = 'confidence-row';

        const label = document.createElement('span');
        label.className = 'confidence-label';
        label.textContent = cls.replace(/_/g, ' ');

        const track = document.createElement('div');
        track.className = 'bar-track';

        const fill = document.createElement('div');
        // Low-confidence bars get a lighter colour so the winner stands out
        fill.className = 'bar-fill' + (isTop ? '' : ' low');

        const pctLabel = document.createElement('span');
        pctLabel.className = 'pct';
        pctLabel.textContent = pct.toFixed(1) + '%';

        track.appendChild(fill);
        row.appendChild(label);
        row.appendChild(track);
        row.appendChild(pctLabel);
        scoresDiv.appendChild(row);

        // Animate the bar width after a short delay so the CSS transition fires
        requestAnimationFrame(() => {
          setTimeout(() => { fill.style.width = pct + '%'; }, 50);
        });
      });

      // Plain-language description from classes_detailed.json
      descBox.textContent = data.description;

      // Show everything
      resultSec.style.display = 'block';
      resetBtn.style.display = 'block';
    }

    // ── Reset to initial state ──────────────────────────────────────
    resetBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      previewImg.src = '';
      previewSec.style.display = 'none';
      analyseBtn.style.display = 'none';
      resultSec.style.display = 'none';
      errorBox.style.display = 'none';
      resetBtn.style.display = 'none';
    });
  </script>

</body>
</html>
